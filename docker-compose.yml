# ONE SOLUTIONS — full stack: postgres + NestJS api + Next.js web
# Bring up with:  docker compose up --build
# (Docker was not available in the scaffolding environment, so this file is
#  written to spec but not yet executed — verify on a host with Docker.)

services:
  db:
    image: postgres:16
    container_name: onesolutions-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: onesolutions
      POSTGRES_PASSWORD: onesolutions
      POSTGRES_DB: one_solutions
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onesolutions -d one_solutions"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: onesolutions-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://onesolutions:onesolutions@db:5432/one_solutions?schema=public"
      PORT: "5000"
      NODE_ENV: production
      WEB_ORIGIN: "http://localhost:3000"
      JWT_SECRET: "change-this-super-secret-jwt-key"
      JWT_REFRESH_SECRET: "change-this-different-refresh-jwt-key"
      JWT_ACCESS_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "7d"
      SEED_SUPERADMIN_EMAIL: "admin@onesolutions.local"
      SEED_SUPERADMIN_PASSWORD: "ChangeMe123!"
    # Apply migrations (and seed on first run) before starting the server.
    command: sh -c "npx prisma migrate deploy && node dist/src/main"
    ports:
      - "5000:5000"
    networks:
      - backend

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* is baked at build time. Use the same-origin proxy so the
        # browser only ever talks to the web origin and auth cookies stay first-party.
        NEXT_PUBLIC_API_URL: "/api"
    container_name: onesolutions-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Next.js rewrite proxy target (runtime). Browser → web /api/* → this origin.
      BACKEND_ORIGIN: "http://api:5000"
    ports:
      - "3000:3000"
    networks:
      - backend

volumes:
  pg_data:

networks:
  backend:
    driver: bridge
