# Render Blueprint — ONE SOLUTIONS API (NestJS) on the FREE plan.
# The web (Next.js) frontend is deployed separately on Vercel.
# Database is managed Postgres on Neon (not provisioned by Render) — set
# DATABASE_URL as a secret env var in the Render dashboard / Blueprint sync.
#
# Migrations + seed are run ONCE from a developer machine against Neon
# (prisma is a devDependency, omitted from the production image), so the
# container's start command is just `node dist/src/main` (the Dockerfile CMD).
services:
  - type: web
    name: onesolutions-api
    runtime: docker
    plan: free
    region: virginia             # us-east, same region as the Neon DB
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    healthCheckPath: /api/health  # public endpoint → confirms the service is live
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is injected by Render automatically — the app reads process.env.PORT.
      - key: DATABASE_URL          # Neon connection string (with ?sslmode=require)
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      # WEB_ORIGIN (CORS) intentionally omitted: with the same-origin Vercel proxy
      # the browser never calls the API cross-origin, so CORS is never exercised.
